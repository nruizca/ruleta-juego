<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Ruleta Profesional</title>

<style>
body {
  font-family: Arial;
  background: #f5f6fa;
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 50px;
  margin-top: 50px;
}

.form-box {
  text-align: left;
  max-width: 320px;
}

.ruleta-container {
  position: relative;
  width: 400px;
  text-align: center;

  /* ? GLASS EFFECT */
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;

  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

.puntero {
  width: 0;
  height: 0;
  margin: 0 auto 10px auto;
  border-left: 18px solid transparent;
  border-right: 18px solid transparent;
  border-top: 35px solid #c0c0c0;
}

button {
  padding: 12px 25px;
  background: #0984e3;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

button:disabled {
  background: #b2bec3;
}

input {
  padding: 10px;
  width: 200px;
  margin-bottom: 10px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<div class="container">

  <div class="form-box">
<h2>&iexcl;En Veconinter celebramos tu esfuerzo!</h2> <p class="texto-secundario">Tu compromiso es el motor que nos mueve, y hoy queremos premiarlo.</p> <p class="texto-secundario">Completa tus datos a continuaci&oacute;n para activar la Ruleta Global de Premios y participa.</p> 
<p class="texto-suerte">&iexcl;Mucha suerte!</p>

    <input type="text" id="nombre" placeholder="Nombre"><br>
    <input type="text" id="apellido" placeholder="Apellido"><br>
  </div>

  <div class="ruleta-container">
    <div class="puntero"></div>
    <canvas id="canvas" width="400" height="400"></canvas>

    <br><br>

    <button id="btnGirar" onclick="girar()" disabled>Girar</button>

    <h3 id="resultado"></h3>
  </div>

</div>

<script>

const FLOW_URL = "https://default65bbe6da35e94c18993bee2c16cb7e.64.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/8e9302c33d624fc58a0ae3268d91e120/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=zOouqwSjaqQV-RPcw834jzsTmoL_KB8qvQU83qUVd6U";

// PREMIOS
const premios = [
  "Premio 5","Premio 1","Premio 2",
  "Premio 3","Premio 4","Premio 6"
];

const mensajesPremios = {
  "Premio 5": "El equipo de GH te contactar&aacute; para coordinar la entrega de tu premio",
  "Premio 1": "El equipo de GH te contactar&aacute; para coordinar la entrega de tu premio",
  "Premio 2": "El equipo de GH te contactar&aacute; para coordinar la entrega de tu premio",
  "Premio 3": "El equipo de GH te contactar&aacute; para coordinar la entrega de tu premio",
  "Premio 4": "El equipo de GH te contactar&aacute; para coordinar la entrega de tu premio",
  "Premio 6": "El equipo de GH te contactar&aacute; para coordinar la entrega de tu premio"
};

const colores = ["#0B1F3B","#0F2A4A","#134074","#1E40AF","#2563EB","#3B82F6","#38BDF8","#0EA5E9","#0284C7","#164E63","#0F172A"];

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let girando = false;
let angulo = 0;

// DIBUJAR RULETA
function dibujarRuleta() {
  const total = premios.length;
  const anguloSector = (2 * Math.PI) / total;

  for (let i = 0; i < total; i++) {
    ctx.beginPath();
    ctx.fillStyle = colores[i];
    ctx.moveTo(200,200);
    ctx.arc(200,200,200,i*anguloSector,(i+1)*anguloSector);
    ctx.fill();

    ctx.strokeStyle = "#fff";
    ctx.stroke();

    ctx.save();
    ctx.translate(200,200);
    ctx.rotate(i * anguloSector + anguloSector/2);
    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";
    ctx.font = "bold 14px Arial";
    ctx.fillText(premios[i], 100, 0);
    ctx.restore();
  }
}
dibujarRuleta();

// VALIDACION INPUT
const nombreInput = document.getElementById("nombre");
const apellidoInput = document.getElementById("apellido");
const btnGirar = document.getElementById("btnGirar");

function validarCampos() {
  btnGirar.disabled = !(nombreInput.value.trim() && apellidoInput.value.trim());
}
nombreInput.addEventListener("input", validarCampos);
apellidoInput.addEventListener("input", validarCampos);

// GIRAR CON VALIDACION PREVIA
async function girar(){

  if(girando) return;

  let nombre = nombreInput.value.trim();
  let apellido = apellidoInput.value.trim();
  let identificador = (nombre + apellido).toLowerCase().replace(/\s/g, "");

  // VALIDAR ANTES
  try {
    const res = await fetch("https://default65bbe6da35e94c18993bee2c16cb7e.64.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/8e9302c33d624fc58a0ae3268d91e120/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=zOouqwSjaqQV-RPcw834jzsTmoL_KB8qvQU83qUVd6U", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ 
	   nombre,
       apellido,
       identificador,
	   premio: null,
       validar: true })
    });

    /*const text = await res.text();
    let data = {};
    try { data = JSON.parse(text); } catch {}*/
	const data = await res.json();

    if (data.status === "bloqueado") {
      alert("Ya participaste");
      btnGirar.disabled = true;
      btnGirar.innerText = "Ya participaste";
      return;
    }

  } catch (e) {
  console.error(e);
  alert("Error validando participación");
  return;
  }

  // GIRAR
  girando = true;

  let total = premios.length;
  let sectorGanador = Math.floor(Math.random() * total);
  let premio = premios[sectorGanador];

  let tamanoSector = 360 / total;
  let anguloFinal = 360 - (sectorGanador * tamanoSector) - (tamanoSector/2) - 90;
  let destino = (3 * 360 + anguloFinal) * (Math.PI / 180);

  let inicio = null;

  function animar(timestamp){

    if(!inicio) inicio = timestamp;

    let progreso = timestamp - inicio;
    let porcentaje = Math.min(progreso / 2000, 1);

    angulo = destino * porcentaje;

    ctx.clearRect(0,0,400,400);
    ctx.save();
    ctx.translate(200,200);
    ctx.rotate(angulo);
    ctx.translate(-200,-200);
    dibujarRuleta();
    ctx.restore();

    if(porcentaje < 1){
      requestAnimationFrame(animar);
    } else {

      girando = false;

      confetti({ particleCount: 150, spread: 90 });

      //document.getElementById("resultado").innerText = "?? " + premio;
	  let mensajeExtra = mensajesPremios[premio] || "Sin mensaje asignado";

	document.getElementById("resultado").innerHTML =
"<b>" + premio + "</b><br><small>" + mensajeExtra + "</small>";

      // GUARDAR RESULTADO
      fetch("https://default65bbe6da35e94c18993bee2c16cb7e.64.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/8e9302c33d624fc58a0ae3268d91e120/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=zOouqwSjaqQV-RPcw834jzsTmoL_KB8qvQU83qUVd6U", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          nombre,
          apellido,
          premio,
          identificador,
          validar: false
        })
      })
	  .then(res => res.json())
.then(data => {

  console.log("Respuesta flujo:", data);

  // 🚫 PREMIO AGOTADO
  if (data.status === "agotado") {
    document.getElementById("resultado").innerHTML = "Buscando otro premio disponible...";
    
    setTimeout(() => girar(), 800);
    return;
  }

  // 🚫 USUARIO BLOQUEADO (doble seguridad)
  if (data.status === "bloqueado") {
    alert("Ya participaste");
    btnGirar.disabled = true;
    return;
  }

  // ✅ PREMIO OK
  let mensajeExtra = mensajesPremios[premio] || "";

  /*document.getElementById("resultado").innerHTML =
    "<b>" + premio + "</b><br><small>" + mensajeExtra + "</small>";*/

})
.catch(err => console.error(err))
	  ;

    }
  }

  requestAnimationFrame(animar);
}

</script>

</body>
</html>
