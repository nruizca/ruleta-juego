// DIBUJAR RULETA
function dibujarRuleta() {
  const total = premios.length;
  const anguloSector = (2 * Math.PI) / total;

  for (let i = 0; i < total; i++) {
    ctx.beginPath();
    ctx.fillStyle = colores[i];
    ctx.moveTo(200,200);
    ctx.arc(200,200,200,i*anguloSector,(i+1)*anguloSector);
    ctx.fill();

    ctx.strokeStyle = "#fff";
    ctx.stroke();

    ctx.save();
    ctx.translate(200,200);
    ctx.rotate(i * anguloSector + anguloSector/2);
    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";
    ctx.font = "bold 14px Arial";
    ctx.fillText(premios[i], 100, 0);
    ctx.restore();
  }
}
dibujarRuleta();

// VALIDACION INPUT
const correoInput = document.getElementById("correo");
const btnGirar = document.getElementById("btnGirar");

async function validarCampos() {
  const correo = correoInput.value.trim().toLowerCase();

  const esValido = /^[a-z0-9._%+-]+@veconinter\.com$/.test(correo);

  if (!esValido) {
    btnGirar.disabled = true;
    btnGirar.innerText = "Girar";
    document.getElementById("resultado").innerHTML = "";
    return;
  }

  try {
    const res = await fetch(FLOW_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        correo,
        identificador: correo,
        premio: null,
        validar: true
      })
    });

    let data = {};

      data = await res.json();
    } catch {
      btnGirar.disabled = true;
      return;
    }

    if (data.status === "sin_premios") {

      btnGirar.innerText = "Ruleta finalizada";

    btnGirar.innerText = "Girar";
    document.getElementById("resultado").innerHTML = "";

  } catch (error) {
    console.error(error);
    btnGirar.disabled = true;
  }
}

let timeoutValidacion;

correoInput.addEventListener("input", () => {

  usuarioBloqueado = false;

  clearTimeout(timeoutValidacion);

  const correo = correoInput.value.trim().toLowerCase();
  const esValido = /^[a-z0-9._%+-]+@veconinter\.com$/.test(correo);

  if (!esValido) {
    btnGirar.disabled = true;
    btnGirar.innerText = "Girar";
    return;
  }

  // ? ACTIVAR BOTÓN INMEDIATAMENTE
  btnGirar.disabled = true;

  // ? VALIDACIÓN EN BACKGROUND
  timeoutValidacion = setTimeout(() => {
    validarCampos();
  }, 500); // puedes subirlo a 800–1000ms
});

function calcularDestino(sectorIndex) {
  let total = premios.length;
  let tamanoSector = 360 / total;

  let anguloBase = sectorIndex * tamanoSector;
  let centroSector = anguloBase + (tamanoSector / 2);

  // Ajuste por puntero arriba
  let anguloFinal = 360 - centroSector - 90;

  return (3 * 360 + anguloFinal) * (Math.PI / 180);
}

let mensajeExtra = mensajesPremios[nuevoPremio] || "";
