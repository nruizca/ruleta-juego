<!DOCTYPE html>
<html>
<head>
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Ruleta Profesional</title>

<style>
body {
  font-family: Arial;
  background: #f5f6fa;
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 50px;
  margin-top: 50px;
}

.form-box {
  text-align: left;
  max-width: 320px;
}

.ruleta-container {
  position: relative;
  width: 400px;
  text-align: center;
}

.puntero {
  width: 0;
  height: 0;
  border-left: 22px solid transparent;
  border-right: 22px solid transparent;
  border-top: 35px solid #2d3436;
  margin: 0 auto 10px auto;
}

button {
  padding: 12px 25px;
  background: #0984e3;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 5px;
  font-size: 16px;
}

button:disabled {
  background: #b2bec3;
}

input {
  padding: 10px;
  width: 200px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

  <!-- FORMULARIO -->
  <div class="form-box">
    <h2>¡En Veconinter celebramos tu esfuerzo!</h2>

    <p class="texto-secundario">
      Tu compromiso es el motor que nos mueve, y hoy queremos premiarlo.
    </p>

    <p class="texto-secundario">
      Completa tus datos para activar la Ruleta.
    </p>

    <p class="texto-suerte">¡Mucha suerte!</p>

    <input type="text" id="nombre" placeholder="Nombre"><br>
    <input type="text" id="apellido" placeholder="Apellido"><br>
  </div>

  <!-- RULETA -->
  <div class="ruleta-container">

    <div class="puntero"></div>
    <canvas id="canvas" width="400" height="400"></canvas>

    <br><br>

    <button id="btnGirar" onclick="girar()" disabled>Girar</button>

    <h3 id="resultado"></h3>

  </div>

</div>

<script>
const premios = [
  "Giftcard",
  "Descuento 10%",
  "Premio sorpresa",
  "Sigue intentando",
  "Descuento 20%",
  "Premio especial"
];

const colores = ["#ff7675","#74b9ff","#55efc4","#ffeaa7","#a29bfe","#fd79a8"];

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let girando = false;
let angulo = 0;

// 🎨 RULETA
function dibujarRuleta() {
  const total = premios.length;
  const anguloSector = (2 * Math.PI) / total;

  for (let i = 0; i < total; i++) {
    ctx.beginPath();
    ctx.fillStyle = colores[i];
    ctx.moveTo(200,200);
    ctx.arc(200,200,200,i*anguloSector,(i+1)*anguloSector);
    ctx.fill();

    ctx.save();
    ctx.translate(200,200);
    ctx.rotate(i * anguloSector + anguloSector/2);
    ctx.fillStyle = "#000";
    ctx.textAlign = "center";
    ctx.font = "bold 14px Arial";
    ctx.fillText(premios[i], 100, 0);
    ctx.restore();
  }
}

dibujarRuleta();

// 🔓 VALIDACIÓN
const nombreInput = document.getElementById("nombre");
const apellidoInput = document.getElementById("apellido");
const btnGirar = document.getElementById("btnGirar");

function validarCampos() {
  btnGirar.disabled = !(nombreInput.value.trim() && apellidoInput.value.trim());
}

nombreInput.addEventListener("input", validarCampos);
apellidoInput.addEventListener("input", validarCampos);

// 🎡 GIRAR
function girar(){
  if(girando) return;
  girando = true;

  let total = premios.length;
  let sectorGanador = Math.floor(Math.random() * total);
  let premio = premios[sectorGanador];

  let nombre = nombreInput.value;
  let apellido = apellidoInput.value;

  // 🔥 IDENTIFICADOR ÚNICO (CLAVE ANTI DUPLICADOS)
  let identificador = (nombre + apellido).toLowerCase().replace(/\s/g, "");

  let tamanoSector = 360 / total;
  let anguloFinal = 360 - (sectorGanador * tamanoSector) - (tamanoSector/2) - 90;
  let vueltas = 3 * 360;
  let destino = (vueltas + anguloFinal) * (Math.PI / 180);

  let inicio = null;

  function animar(timestamp){
    if(!inicio) inicio = timestamp;

    let progreso = timestamp - inicio;
    let porcentaje = Math.min(progreso / 2000, 1);

    angulo = destino * porcentaje;

    ctx.clearRect(0,0,400,400);
    ctx.save();
    ctx.translate(200,200);
    ctx.rotate(angulo);
    ctx.translate(-200,-200);
    dibujarRuleta();
    ctx.restore();

    if(porcentaje < 1){
      requestAnimationFrame(animar);
    } else {
      girando = false;

      document.getElementById("resultado").innerText = "🎉 " + premio;

      console.log("ENVIANDO:", {
        nombre,
        apellido,
        premio,
        identificador
      });

      fetch("https://default65bbe6da35e94c18993bee2c16cb7e.64.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/8e9302c33d624fc58a0ae3268d91e120/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=zOouqwSjaqQV-RPcw834jzsTmoL_KB8qvQU83qUVd6U", {
        method: "POST",
        headers: {
          "Content-Type": "application/json; charset=utf-8"
        },
        body: JSON.stringify({
          nombre: nombre,
          apellido: apellido,
          premio: premio,
          identificador: identificador
        })
      })
      .then(res => res.text())
      .then(data => console.log("Power Automate OK:", data))
      .catch(err => console.error("ERROR:", err));
    }
  }

  requestAnimationFrame(animar);
}
</script>

</body>
</html>
